services:
  edge-router:
    image: python:3.12-slim
    container_name: zgitea-edge-router
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8080"
    volumes:
      - ./:/app:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
