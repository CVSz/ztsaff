version: '3.8'
services:
  edge-router:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../apps/edge-router:/app
    command: ["python", "main.py"]
    environment:
      - ZGITEA_WEBHOOK_SECRET=dev-secret
    ports:
      - "8080:8080"

  control-plane:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../apps/control-plane:/app
    command: ["python", "main.py"]

  ai-scheduler:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../apps/ai-scheduler:/app
    command: ["python", "main.py"]
